<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wave | mini browser</title>
    <link rel="shortcut icon" href="/assets/img/wave-logo.svg" type="image/svg+xml" id="tabIcon">
    <link rel="stylesheet" href="/assets/css/colors.css" id="css-theme-link">
    <link rel="stylesheet" href="/assets/css/elements.css">
    <link rel="stylesheet" href="/assets/css/font.css">
    <link rel="stylesheet" href="/assets/icons/fonts/remixicon.css">
    <script src="/assets/js/lib/particles.js"></script>
    <script src="/baremux/index.js"></script>
    <script src="/assets/js/colors.js"></script>
    <script src="/homework/math.all.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/eruda@3.4.3/eruda.min.js"></script>
    <script>
        async function swium() {
            await navigator.serviceWorker.register("/sw.js").catch(e => {
                console.log("Error registering service worker (SJ): " + e)
            });
        }

        window.addEventListener("load", () => {
            swium();
        });
    </script>
</head>

<body>

    <style>
        .browser-container {
            background: linear-gradient(180deg, rgba(6, 7, 10, 0.98) 0%, rgba(0, 0, 0, 0.98) 100%);
            width: 100%;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 6;
            transition: 0.2s;
        }

        .browser-frame {
            width: 99.25%;
            height: 84vh;
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, 0.10);
            display: none;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
        }

        .browser-frame.active {
            display: block;
            opacity: 1;
            pointer-events: all;
        }

        .browser-controls {
            position: fixed;
            width: 100%;
            left: 0;
            top: 0;
            padding: 15px;
        }

        .tabs {
            display: none;
            align-items: center;
            gap: 5px;
            margin-left: 0px;
            margin-bottom: 10px;
        }

        .browser-buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .browser-buttons .hcontainer {
            display: flex;
            position: absolute;
            left: 50%;
            transform: translateX(-51%);
            margin-top: 35px;
            gap: 05px;
            width: 95%;
        }

        .browser-buttons button {
            height: 40px;
            width: 40px;
            flex-shrink: 0;
            padding: 0;
            font-size: 16px;
            border-radius: 10px;
            transition: 0.2s;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text);
        }

        .browser-buttons button:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
        }

        .ri {
            font-size: 20px;
        }

        .browser-buttons input {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            height: 40px;
            padding: 0 20px;
            flex: 0.95;
            transition: 0.2s;
            color: var(--text);
            font-family: Arial;
            outline: none;
            font-size: 14px;
        }

        .browser-buttons input:focus {
            outline: none;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .browser-buttons input::placeholder {
            color: rgba(255, 255, 255, 0.55);
        }

        .tab {
            background: rgba(255, 255, 255, 0.04);
            max-width: 200px;
            min-width: 25px;
            padding: 10px 15px;
            border-radius: 10px;
            transition: 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .tab span {
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            flex: 1;
            color: var(--text);
        }

        .tab:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .tab.active {
            background: rgba(255, 255, 255, 0.10);
            border: 1px solid rgba(255, 255, 255, 0.14);
        }

        .tab img {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .tab .close-btn {
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text);
            flex-shrink: 0;
        }

        .tab .close-btn:hover {
            color: var(--accent);
        }

        .newtab {
            background: rgba(255, 255, 255, 0.04);
            height: 40px;
            width: 40px;
            border-radius: 10px;
            transition: 0.2s;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text);
            flex-shrink: 0;
        }

        .newtab:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
        }

        .browser-loading {
            background: var(--bg-2);
            height: 3px;
            width: 200px;
            position: relative;
            transform: translate(-50%, -50%);
            left: 50%;
            top: 55%;
            border-radius: 100px;
        }

        .browser-loading::after {
            content: "";
            position: absolute;
            height: 100%;
            background: var(--accent);
            left: 0;
            border-radius: 100px;
            bottom: 0;
            width: 100%;
            animation: browser-loading-lol .75s infinite ease;
        }

        @keyframes browser-loading-lol {
            0% {
                transform-origin: left;
                transform: scaleX(0);
            }

            50% {
                transform-origin: left;
                transform: scaleX(1);
            }

            50.01% {
                transform-origin: right;
                transform: scaleX(1);
            }

            100% {
                transform-origin: right;
                transform: scaleX(0);
            }
        }
    </style>

    <div class="browser-container">
        <div class="browser-controls">
            <div class="tabs">
                <button class="newtab" onclick="newTab()">
                    <i class="ri-add-line ri"></i>
                </button>
            </div>
            <div class="browser-buttons">
                <div class="hcontainer">
                    <button onclick="b()">
                        <i class="ri-arrow-left-line ri"></i>
                    </button>
                    <button onclick="f()">
                        <i class="ri-arrow-right-line ri"></i>
                    </button>
                    <button onclick="r()">
                        <i class="ri-restart-line ri"></i>
                    </button>
                    <input type="text" id="searchbar" placeholder="Search for anything or enter a URL...">
                    <button onclick="full()">
                        <i class="ri-fullscreen-line ri"></i>
                    </button>
                </div>
            </div>
        </div>
        <div class="browser-loading"></div>
    </div>
    <script src="/assets/js/browserfunctions.js"></script>
    <script defer>
        newTab()

        function rSearch(input) {
            let url = input;
            if (!url.includes(".") || url.includes(" ")) {
                url = "https://search.brave.com/search?q=" + url;
            } else {
                if (!url.startsWith("http://") && !url.startsWith("https://")) {
                    url = "https://" + url;
                }
            }

            const b = document.querySelector(".browser-container")
            const frames = document.querySelectorAll(".viewframe")

            b.style.opacity = 1
            b.style.pointerEvents = "all"

            frames.forEach(frame => {
                frame.style.opacity = 1
                frame.style.pointerEvents = "all"
            })

            console.log("rSearch")
            nav(url)
        }
        const homesearch = document.getElementById("searchbar");

        homesearch.addEventListener("keydown", (e) => {
            console.log("askjdfaskhjlgdf")
            if (e.key === "Enter") {
                rSearch(homesearch?.value.trim());
                console.log("rsearching")
            }
            console.log("check")
        });
    </script>
    <div id="cursor-thank-you-zxs"
        style="position: fixed; top: 0px; left: 0px; width: 16px; height: 16px; border-radius: 50%; background: color-mix(in srgb, var(--accent) 70%, white 30%); pointer-events: none; z-index: 9999; transform: translate(748px, 592px); transition: width 0.15s, height 0.15s, opacity 0.15s; mix-blend-mode: difference; opacity: 0;">
    </div>
    <script src="/assets/js/cursor.js"></script>
</body>

</html>
